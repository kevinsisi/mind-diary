services:
  mind-diary:
    image: kevin950805/mind-diary:latest
    container_name: mind-diary
    restart: unless-stopped
    ports:
      - "8823:8823"
    environment:
      - TZ=Asia/Taipei
      - PORT=8823
      - DATABASE_PATH=/app/data/mind-diary.db
      - GEMINI_API_KEYS=${GEMINI_API_KEYS}
    volumes:
      - mind-diary-data:/app/data

volumes:
  mind-diary-data:
